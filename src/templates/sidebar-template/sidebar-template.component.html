<div
  class="template"
  [class.sidebar-expanded]="!isDesktopCollapsed"
  [class.sidebar-collapsed]="isDesktopCollapsed"
>
  <app-header (menuClicked)="sidebarTemplateService.toggleSidebar(true)" />
  <app-sidebar
    [isOpen]="(isSidebarOpen$ | async)!"
    [itemsList]="itemsList"
    [isDesktopCollapsed]="isDesktopCollapsed"
    (desktopCollapsedChange)="isDesktopCollapsed = $event"
    (onClose)="sidebarTemplateService.toggleSidebar(false)"
  />
  <div class="p-4">
    <div class="content">
      <p-breadcrumb
        [model]="(breadcrumbs$ | async)!"
        [home]="breadcrumbService.home"
      />
      <router-outlet />
    </div>
  </div>
</div>
